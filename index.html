<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Socialgati \u2014 India's Community & News</title>
  <meta name="description" content="India's fastest growing news community by NewsTally."/>
  <meta name="theme-color" content="#1B6EF5"/>
  <link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png"/>
  <link rel="apple-touch-icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Google Sans', 'Roboto', 'system-ui', 'sans-serif'],
            display: ['Google Sans Display', 'Google Sans', 'sans-serif'],
          },
          colors: {
            primary:    '#1B6EF5',
            'on-primary': '#FFFFFF',
            'primary-container': '#D6E4FF',
            'on-primary-container': '#001849',
            secondary:  '#7B5EA7',
            'on-secondary': '#FFFFFF',
            'secondary-container': '#EEDCFF',
            'on-secondary-container': '#260057',
            tertiary:   '#006879',
            'tertiary-container': '#97F0FF',
            error:      '#BA1A1A',
            'error-container': '#FFDAD6',
            'm3-bg':    '#FAFCFF',
            'm3-surface': '#FAFCFF',
            'm3-surface-variant': '#E1E2EC',
            'm3-outline': '#74777F',
            'm3-outline-variant': '#C4C6D0',
          },
          borderRadius: {
            'xs':   '4px',
            'sm':   '8px',
            'md':   '12px',
            'lg':   '16px',
            'xl':   '28px',
            'full': '9999px',
          },
          boxShadow: {
            'elev1': '0 1px 2px rgba(0,0,0,.08), 0 1px 3px 1px rgba(0,0,0,.06)',
            'elev2': '0 1px 2px rgba(0,0,0,.08), 0 2px 6px 2px rgba(0,0,0,.08)',
            'elev3': '0 4px 8px 3px rgba(0,0,0,.1),  0 1px 3px rgba(0,0,0,.08)',
            'elev4': '0 6px 10px 4px rgba(0,0,0,.1),  0 2px 3px rgba(0,0,0,.08)',
          },
          transitionTimingFunction: {
            'm3': 'cubic-bezier(0.2, 0, 0, 1)',
            'm3-decel': 'cubic-bezier(0, 0, 0, 1)',
            'm3-accel': 'cubic-bezier(0.3, 0, 1, 1)',
          },
          transitionDuration: {
            'm3-short': '200ms',
            'm3-med':   '300ms',
            'm3-long':  '500ms',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
